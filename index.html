<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="Voluntários da Pátria Joias | Em Breve">
    <meta property="og:description" content="Nosso novo site está chegando. Em breve, uma experiência completa para você.">
    <meta property="og:image" content="img/logo.png">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://voluntariosdapatriajoias.com.br">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', system-ui, sans-serif;
            background: #0A0A0A;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background particles */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(212, 160, 23, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(255, 215, 0, 0.04) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(212, 160, 23, 0.05) 0%, transparent 50%);
            animation: bgPulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgPulse {
            0% { opacity: 0.5; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        /* Gold floating particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: #D4A017;
            border-radius: 50%;
            opacity: 0;
            animation: float linear infinite;
        }

        .particle:nth-child(1) { left: 10%; animation-duration: 12s; animation-delay: 0s; }
        .particle:nth-child(2) { left: 25%; animation-duration: 15s; animation-delay: 2s; }
        .particle:nth-child(3) { left: 40%; animation-duration: 11s; animation-delay: 4s; }
        .particle:nth-child(4) { left: 55%; animation-duration: 14s; animation-delay: 1s; }
        .particle:nth-child(5) { left: 70%; animation-duration: 13s; animation-delay: 3s; }
        .particle:nth-child(6) { left: 85%; animation-duration: 16s; animation-delay: 5s; }
        .particle:nth-child(7) { left: 15%; animation-duration: 10s; animation-delay: 6s; }
        .particle:nth-child(8) { left: 60%; animation-duration: 17s; animation-delay: 7s; }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.2; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .container {
            padding: 40px 24px;
            max-width: 520px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        /* Logo with glow */
        .logo-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 48px;
        }

        .logo-wrapper::before {
            content: '';
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle, rgba(212, 160, 23, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: logoGlow 4s ease-in-out infinite alternate;
        }

        @keyframes logoGlow {
            0% { opacity: 0.5; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1.1); }
        }

        .logo {
            width: 200px;
            height: auto;
            display: block;
            position: relative;
            z-index: 1;
            filter: drop-shadow(0 0 30px rgba(212, 160, 23, 0.2));
        }

        /* Gold line separator */
        .gold-line {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D4A017, transparent);
            margin: 0 auto 32px;
        }

        /* Title */
        .title {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: 6px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #D4A017, #FFD700, #F5C518, #D4A017);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shimmer 4s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .title-sub {
            font-size: 0.85rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #666;
            margin-bottom: 32px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 1rem;
            color: #888;
            margin-bottom: 48px;
            line-height: 1.7;
            font-weight: 400;
        }

        /* Buttons */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 15px 36px;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            width: 280px;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.1) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform 0.6s;
        }

        .btn:hover::before {
            transform: translateX(100%);
        }

        .btn--whatsapp {
            background: #25D366;
            color: #fff;
            border-color: #25D366;
        }

        .btn--whatsapp:hover {
            background: #1fb855;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(37, 211, 102, 0.3);
        }

        .btn--instagram {
            background: transparent;
            color: #ccc;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn--instagram:hover {
            border-color: #E1306C;
            color: #E1306C;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(225, 48, 108, 0.15);
        }

        .btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            flex-shrink: 0;
        }

        /* Footer */
        .footer {
            margin-top: 56px;
        }

        .footer-line {
            width: 40px;
            height: 1px;
            background: rgba(212, 160, 23, 0.3);
            margin: 0 auto 16px;
        }

        .footer-text {
            font-size: 0.75rem;
            color: #444;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 420px) {
            .logo { width: 160px; }
            .logo-wrapper { margin-bottom: 36px; }
            .title { font-size: 2.2rem; letter-spacing: 4px; }
            .title-sub { font-size: 0.75rem; letter-spacing: 3px; }
            .subtitle { font-size: 0.9rem; margin-bottom: 36px; }
            .btn { width: 100%; padding: 14px 24px; font-size: 0.9rem; }
        }
    </style>
</head>
